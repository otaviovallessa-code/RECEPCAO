<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atendimento CPM Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background: #0b3c66; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 10px; width: 500px; margin: auto; border: 1px solid #444; }
        .status { font-size: 35px; color: #ff0000; font-weight: bold; margin: 20px 0; }
        .btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-call { background: #d50000; color: white; }
        .btn-excel { background: #28a745; color: white; margin-top: 20px; }
        .fila-lista { background: white; color: #333; margin-top: 30px; border-radius: 8px; padding: 10px; text-align: left; }
    </style>
</head>
<body>
    <h1>ATENDIMENTO CPM</h1>
    <div class="box">
        <div id="display" class="status">AGUARDANDO...</div>
        <button class="btn btn-call" onclick="chamarProximo()">CHAMAR PRÓXIMO</button>
        <button class="btn btn-excel" onclick="baixarExcel()">📊 BAIXAR RELATÓRIO DO DIA</button>
    </div>
    <div class="fila-lista" id="fila"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://sistemacpm-dd706-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let fila = [];

        db.ref('atendimentos').on('value', snap => {
            fila = [];
            snap.forEach(c => {
                const item = c.val(); item.key = c.key;
                if(item.status === "AGUARDANDO") fila.push(item);
            });
            fila.sort((a,b) => (a.prioridade === b.prioridade) ? a.timestamp - b.timestamp : (a.prioridade ? -1 : 1));
            
            let html = "<b>FILA ATUAL:</b><br>";
            fila.forEach(f => html += `${f.senha} - ${f.nome}<br>`);
            document.getElementById('fila').innerHTML = html;
        });

        function chamarProximo() {
            if(fila.length === 0) return alert("Fila Vazia");
            const s = fila[0];
            db.ref('atendimentos/' + s.key).update({ status: "ATENDIDO", horaChamada: new Date().toLocaleTimeString() });
            db.ref('senha_atual').set({ senha: s.senha, nome: s.nome, assunto: s.assunto, timestamp: Date.now() });
            document.getElementById('display').innerText = s.senha;
        }

        function baixarExcel() {
            db.ref('atendimentos').once('value', snap => {
                const dados = [];
                snap.forEach(c => dados.push(c.val()));
                const ws = XLSX.utils.json_to_sheet(dados);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Atendimentos");
                XLSX.writeFile(wb, "Relatorio_CPM.xlsx");
            });
        }
    </script>
</body>
</html>
