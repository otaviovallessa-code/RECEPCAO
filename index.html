<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CPM - Gerador de Senhas</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --azul-ba: #0b3c66; --vermelho-ba: #d50000; --branco: #ffffff; }
        
        body { 
            background-color: var(--azul-ba); 
            color: var(--branco); 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
        }

        header { 
            width: 100%; 
            max-width: 800px;
            text-align: center; 
            border-bottom: 4px solid var(--vermelho-ba); 
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        /* Formulário */
        .container-form { 
            background: var(--branco); 
            padding: 30px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 650px; 
            color: #333; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
        }

        label { font-size: 11px; font-weight: bold; color: var(--azul-ba); text-transform: uppercase; display: block; margin-bottom: 4px; }
        
        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            box-sizing: border-box; 
            font-size: 15px;
        }

        .row { display: flex; gap: 15px; }
        .row div { flex: 1; }

        .options { 
            background: #f4f7f6; 
            padding: 15px; 
            border-radius: 6px; 
            margin-bottom: 20px; 
            border: 1px solid #ddd;
        }

        .btn-gerar { 
            background: var(--vermelho-ba); 
            color: white; 
            border: none; 
            padding: 20px; 
            font-size: 18px; 
            font-weight: bold; 
            width: 100%; 
            border-radius: 8px; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.2s;
        }
        .btn-gerar:hover { background: #b30000; transform: scale(1.01); }

        /* Lista de Senhas Geradas */
        .lista-container { 
            width: 100%; 
            max-width: 800px; 
            margin-top: 40px; 
        }

        .lista-container h3 { 
            border-left: 5px solid var(--vermelho-ba); 
            padding-left: 15px; 
            font-size: 20px; 
            margin-bottom: 15px; 
        }

        .tabela-senhas { 
            width: 100%; 
            background: white; 
            color: #333; 
            border-collapse: collapse; 
            border-radius: 8px; 
            overflow: hidden; 
        }

        .tabela-senhas th { background: #eee; padding: 12px; text-align: left; color: var(--azul-ba); font-size: 12px; }
        .tabela-senhas td { padding: 12px; border-bottom: 1px solid #ddd; font-size: 14px; }
        
        /* Rodapé Admin */
        .admin-footer { 
            margin-top: 40px; 
            display: flex; 
            gap: 15px; 
            width: 100%; 
            max-width: 650px; 
        }
        .btn-admin { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; }
        .btn-relatorio { background: #28a745; }
        .btn-reset { background: #555; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin:0">GOVERNO DO ESTADO DA BAHIA</h1>
        <div style="font-size:14px; opacity:0.9">SEC - COORDENAÇÃO DE PROVIMENTO E MOVIMENTAÇÃO</div>
    </header>

    <div class="container-form">
        <label>Nome Completo do Requerente</label>
        <input type="text" id="nome" placeholder="Digite o nome completo">

        <div class="row">
            <div>
                <label>Matrícula</label>
                <input type="text" id="matricula" placeholder="00.000.000">
            </div>
            <div>
                <label>Telefone</label>
                <input type="text" id="telefone" placeholder="(71) 90000-0000">
            </div>
        </div>

        <label>Assunto / Tipo de Atendimento</label>
        <input type="text" id="assunto" placeholder="Ex: Dossiê, Recadastramento">

        <div class="options">
            <label style="margin-bottom:8px">Tipo de Vínculo e Prioridade</label>
            <input type="radio" name="tipo" value="EFETIVO" checked> Efetivo 
            <input type="radio" name="tipo" value="REDA" style="margin-left:15px"> REDA
            <input type="radio" name="tipo" value="INTERNO" style="margin-left:15px"> Interno
            <hr style="border:0; border-top:1px solid #ddd; margin:10px 0">
            <input type="checkbox" id="prio"> <b style="color:var(--vermelho-ba)">ATENDIMENTO PRIORITÁRIO</b>
        </div>

        <button class="btn-gerar" onclick="gerarSenha()">Emitir Senha de Atendimento</button>
    </div>

    <div class="lista-container">
        <h3>Senhas em Espera</h3>
        <table class="tabela-senhas">
            <thead>
                <tr>
                    <th>SENHA</th>
                    <th>NOME</th>
                    <th>ASSUNTO</th>
                    <th>TELEFONE</th>
                    <th>HORA</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela">
                </tbody>
        </table>
    </div>

    <div class="admin-footer">
        <button class="btn-admin btn-relatorio" onclick="exportarRelatorio()">📊 RELATÓRIO DO DIA</button>
        <button class="btn-admin btn-reset" onclick="resetarSistema()">♻️ ZERAR SISTEMA</button>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = { databaseURL: "https://sistemacpm-dd706-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // GERAR SENHA
        function gerarSenha() {
            const nome = document.getElementById('nome').value.toUpperCase();
            if(!nome) return alert("Por favor, preencha o nome.");

            const tipo = document.querySelector('input[name="tipo"]:checked').value;
            const ehPrio = document.getElementById('prio').checked;

            db.ref('atendimentos').once('value', snap => {
                const total = snap.numChildren() + 1;
                // Prefixo I para Atendimento Interno
                const prefixo = ehPrio ? "P" : (tipo === "INTERNO" ? "I" : tipo[0]);
                const senha = prefixo + String(total).padStart(3, '0');

                db.ref('atendimentos').push({
                    senha,
                    nome,
                    tipo,
                    prioridade: ehPrio,
                    matricula: document.getElementById('matricula').value || "---",
                    telefone: document.getElementById('telefone').value || "---",
                    assunto: document.getElementById('assunto').value.toUpperCase() || "GERAL",
                    status: "AGUARDANDO",
                    hora: new Date().toLocaleTimeString(),
                    timestamp: Date.now()
                });

                // Limpar campos
                document.getElementById('nome').value = "";
                document.getElementById('assunto').value = "";
                document.getElementById('prio').checked = false;
                alert("Senha Gerada com Sucesso: " + senha);
            });
        }

        // ATUALIZAR LISTA EM TEMPO REAL
        db.ref('atendimentos').on('value', snap => {
            let html = "";
            snap.forEach(child => {
                const d = child.val();
                if(d.status === "AGUARDANDO") {
                    html += `<tr>
                        <td><b style="color:var(--vermelho-ba)">${d.senha}</b></td>
                        <td>${d.nome}</td>
                        <td>${d.assunto}</td>
                        <td>${d.telefone}</td>
                        <td>${d.hora}</td>
                    </tr>`;
                }
            });
            document.getElementById('corpo-tabela').innerHTML = html || '<tr><td colspan="5" style="text-align:center">Nenhuma senha aguardando.</td></tr>';
        });

        // ADMIN: RELATÓRIO
        function exportarRelatorio() {
            db.ref('atendimentos').once('value', snap => {
                let csv = "\ufeffSenha;Nome;Tipo;Assunto;Telefone;Hora\n";
                snap.forEach(c => { 
                    const d = c.val(); 
                    csv += `${d.senha};${d.nome};${d.tipo};${d.assunto};${d.telefone};${d.hora}\n`; 
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'Relatorio_CPM_Bahia.csv';
                a.click();
            });
        }

        // ADMIN: RESET
        function resetarSistema() {
            if(confirm("Deseja realmente zerar todos os atendimentos?") && prompt("Senha de Admin:") === "123") {
                db.ref('atendimentos').remove();
                db.ref('senha_atual').remove();
                location.reload();
            }
        }
    </script>
</body>
</html>
