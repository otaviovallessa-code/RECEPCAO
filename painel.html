<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel TV - CPM</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: #0b3c66; color: white; font-family: Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; overflow: hidden; }
        .box { background: rgba(0,0,0,0.3); padding: 50px; border-radius: 30px; border: 10px solid #d50000; text-align: center; width: 80%; }
        .label { font-size: 50px; text-transform: uppercase; }
        .senha { font-size: 250px; font-weight: bold; color: #ff0000; margin: 20px 0; }
        .nome { font-size: 80px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="box">
        <div class="label">Senha Atual</div>
        <div id="senha" class="senha">---</div>
        <div id="nome" class="nome">Aguardando...</div>
    </div>

    <audio id="som"><source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const firebaseConfig = { databaseURL: "https://sistemacpm-dd706-default-rtdb.firebaseio.com/"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let ultimaSenha = "";

        db.ref('senha_atual').on('value', snapshot => {
            const data = snapshot.val();
            if(!data) return;

            // Se for uma senha nova (evita repetir ao dar refresh)
            if(data.timestamp !== ultimaSenha) {
                document.getElementById('senha').innerText = data.senha;
                document.getElementById('nome').innerText = data.nome;
                
                // Tocar som
                document.getElementById('som').play();

                // Voz
                const msg = new SpeechSynthesisUtterance(`Senha ${data.senha}. ${data.nome}`);
                msg.lang = 'pt-BR';
                window.speechSynthesis.speak(msg);

                ultimaSenha = data.timestamp;
            }
        });
    </script>
</body>
</html>
